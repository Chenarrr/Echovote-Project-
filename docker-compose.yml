version: '3.9'

services:
  mongo:
    image: mongo:7
    container_name: echovote_mongo
    ports:
      - '127.0.0.1:27017:27017'
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_INITDB_ROOT_USERNAME}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_INITDB_ROOT_PASSWORD}
      - MONGO_INITDB_DATABASE=${MONGO_INITDB_DATABASE}
    volumes:
      - mongo_data:/data/db
    networks:
      - echovote_net

  server:
    build: ./server
    container_name: echovote_server
    ports:
      - '3001:3001'
    environment:
      - NODE_ENV=production
      - PORT=3001
      - MONGO_URI=mongodb://${MONGO_INITDB_ROOT_USERNAME}:${MONGO_INITDB_ROOT_PASSWORD}@mongo:27017/echovote?authSource=admin
      - JWT_SECRET=${JWT_SECRET}
      - YOUTUBE_API_KEY=${YOUTUBE_API_KEY}
      - CLIENT_ORIGIN=${CLIENT_ORIGIN:-http://localhost:5173}
      - SUPER_ADMIN_KEY=${SUPER_ADMIN_KEY}
    depends_on:
      - mongo
    volumes:
      - ./server:/app
      - /app/node_modules
    networks:
      - echovote_net

  client:
    build:
      context: ./client
      args:
        - VITE_API_URL=${VITE_API_URL:-http://localhost:3001}
        - VITE_SOCKET_URL=${VITE_SOCKET_URL:-http://localhost:3001}
    container_name: echovote_client
    ports:
      - '5173:80'
    depends_on:
      - server
    networks:
      - echovote_net

volumes:
  mongo_data:

networks:
  echovote_net:
    driver: bridge
